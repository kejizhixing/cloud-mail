name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
# 只保留一个 cron，每 30 分钟触发，统一调度所有任务（包括原来其他 Worker 的任务）
crons = ["*/30 * * * *"]

[vars]
# 内部调用认证密钥，自己设置一个随机字符串，所有 Worker 共用
CRON_SECRET = "你自定义的一个随机字符串，例如 Xk9pL2mN7vR5wQ8"

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
