name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
# 只保留一个 cron，每30分钟触发一次，用于统一调度所有任务
crons = ["*/30 * * * *"]

[vars]
# 如果你需要其他变量，可以在这里添加，暂时不需要额外变量

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
