name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

# 省略其他注释和绑定...

[ai]
binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["*/5 * * * *"]   # 每5分钟触发一次，用于统一调度所有定时任务

[vars]
# 这里可以加一个共享密钥，用于内部调用认证
CRON_SECRET = "你自定义的一个随机字符串"

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
